# Funding platforms for F19 Stealth Glider.
#
# No funding is solicited for this project. Every key below is intentionally
# blank rather than deleted, so that the supported set stays visible if that
# ever changes.

github: # up to 4 GitHub Sponsors-enabled usernames, e.g. [user1, user2]
patreon: # a single Patreon username
open_collective: # a single Open Collective username
ko_fi: # a single Ko-fi username
tidelift: # a single Tidelift platform-name/package-name, e.g. npm/babel
community_bridge: # a single Community Bridge project-name
liberapay: # a single Liberapay username
issuehunt: # a single IssueHunt username
lfx_crowdfunding: # a single LFX Crowdfunding project-name
polar: # a single Polar username
buy_me_a_coffee: # a single Buy Me a Coffee username
thanks_dev: # a single thanks.dev username
custom: # up to 4 custom sponsorship URLs
